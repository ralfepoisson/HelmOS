services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: helmos-litellm
    restart: unless-stopped
    env_file:
      - .env.litellm
    ports:
      - "${LITELLM_PROXY_PORT:-4000}:4000"
    networks:
      - default
      - litellm_db_net
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"

networks:
  litellm_db_net:
    external: true
    name: litellm_default
